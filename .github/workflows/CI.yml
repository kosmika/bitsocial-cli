# CI for the src folder
name: CI

on:
  pull_request:
    branches:
      - master
      - next
    paths:
      - 'test/**'
      - 'src/**'
      - 'config/**'
      - 'ci-bin/**'
      - 'ci-bin/*'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
  push:
    branches:
      - master
      - next
    paths:
      - 'test/**'
      - 'src/**'
      - 'config/**'
      - 'ci-bin/**'
      - '.github/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'

jobs:
  test-bitsocial-cli:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install -g npm@11.13.0

      - name: Smoke test Docker deps stage
        if: matrix.os == 'ubuntu-latest'
        run: docker build --target deps -t bitsocial-cli:deps-smoke .

      - run: npm ci
      - run: npm run build
      - run: npx oclif manifest

      - name: Verify global install from pack
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARBALL=$(npm pack | tail -1)
          npm install -g "./$TARBALL"
          bitsocial --version

      # disable hosts we shouldn't use (Linux only)
      - name: Block unwanted hosts
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo echo "255.255.255.255 cloudflare-ipfs.com" | sudo tee -a /etc/hosts
          sudo echo "255.255.255.255 pubsubprovider.xyz" | sudo tee -a /etc/hosts

      - run: DEBUG="bitsocial*, plebbit*, oclif*" npm run test:cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
